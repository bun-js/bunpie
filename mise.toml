[tools]
biome = "2.5.1"
bun = "1.3.14"
httpie-go = "0.7.0"
hyperfine = "1.20.0"
"pipx:httpie" = "latest"
"npm:knip" = "6.21.0"
"npm:sort-package-json" = "4.0.0"
"npm:typescript" = "rc"
xh = "0.26.1"

[hooks]
postinstall = "mise run mise:postinstall"

[tasks."bench:cold-start"]
run = "bench/cold-start.sh"

[tasks."bench:build-bin"]
run = "bun build --compile --bytecode --no-compile-autoload-dotenv --no-compile-autoload-bunfig --outfile=bench/bunpie-empty bench/bunpie-empty.ts"

[tasks."biome:check"]
description = "Run Biome checks"
run = "biome check"

[tasks."biome:format"]
description = "Format code with Biome"
run = "biome format --write"

[tasks."biome:lint"]
description = "Run Biome lints"
run = "biome lint"

[tasks."bun:install"]
description = "Install Bun dependencies"
run = "bun install"

[tasks.check]
description = "Run biome:check, knip, typecheck, and tests"
depends = ["biome:check", "knip", "typecheck", "test"]

[tasks."githooks:install"]
description = "Install the repo-local Git hooks path"
run = "git config core.hooksPath .githooks"

[tasks."githooks:pre-commit"]
description = "Run the pre-commit validation suite"
depends = ["check"]

[tasks.knip]
description = "Run Knip"
run = "knip --production"

[tasks."mise:postinstall"]
depends = ["bun:install", "githooks:install"]
description = "Run repository postinstall setup"

[tasks.publish]
description = "Publish the npm package"
depends = ["check"]
interactive = true
run = "npm publish"

[tasks."publish:dry-run"]
description = "Dry-run publishing the npm package"
depends = ["check"]
run = "npm publish --dry-run"

[tasks.test]
description = "Tests"
run = "bun test"

[tasks.typecheck]
description = "TypeScript typecheck"
run = "tsc --noEmit --skipLibCheck"
